name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Unzip project
        run: unzip DrivingSchoolHub.zip

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          chmod +x DrivingSchoolHub/gradlew
          cd DrivingSchoolHub
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: DrivingSchoolHub-APK
          path: DrivingSchoolHub/app/build/outputs/apk/debug/app-debug.apk
