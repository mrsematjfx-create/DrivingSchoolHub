name: Build Driving School Hub APK on: push: branches: [ main, master ] workflow_dispatch: jobs: build: runs-on: ubuntu-latest steps: - name: Checkout code uses: actions/checkout@v3 - name: Set up JDK 17 uses: actions/setup-java@v3 with: java-version: '17' distribution: 'temurin' - name: Set up Android SDK uses: android-actions/setup-android@v3 - name: Install SDK components run: sdkmanager "platforms;android-34" "build-tools;34.0.0" - name: Make gradlew executable run: chmod +x DrivingSchoolHub/gradlew - name: Build Debug APK run: | cd DrivingSchoolHub ./gradlew assembleDebug --stacktrace - name: Upload APK uses: actions/upload-artifact@v3 with: name: DrivingSchoolHub-APK path: DrivingSchoolHub/app/build/outputs/apk/debug/app-debug.apk
